  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ay:flex; flex-direction:column; height:100vh; overflow:hidden;\">\n\n  <!-- header -->\n  <header style=\"background:#201C50; color:#fff; padding:16px 26px; flex:none;\">\n    <div style=\"display:flex; align-items:center; gap:14px;\">\n      <div style=\"font-weight:800; letter-spacing:5px; color:#EC136E; font-size:15px;\">QUBRU<\u002Fdiv>\n      <span style=\"width:1px; height:18px; background:rgba(255,255,255,0.25);\"><\u002Fspan>\n      <div style=\"font-size:17px; font-weight:700;\">Data Model Explorer — v2<\u002Fdiv>\n      <span style=\"font-size:11px; font-weight:700; background:rgba(236,19,110,0.2); color:#EC136E; padding:3px 9px; border-radius:11px; letter-spacing:1px;\">DERIVED FROM PROTOTYPE<\u002Fspan>\n      <div style=\"flex:1;\"><\u002Fdiv>\n      <div style=\"font-size:12px; color:rgba(255,255,255,0.7);\">{{ stats }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:12px; color:rgba(255,255,255,0.55); margin-top:5px;\">Every relationship carries a foreign key · supersedes Architecture &amp; Data Model v1.0 · click a card, then trace by Depth.<\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- toolbar -->\n  <div style=\"background:#fff; border-bottom:1px solid #DCD9E8; padding:10px 26px; display:flex; align-items:center; gap:14px; flex:none; flex-wrap:wrap;\">\n    <span style=\"font-size:10px; letter-spacing:1.5px; color:#8E8C99; font-weight:700;\">DEPTH<\u002Fspan>\n    <sc-for list=\"{{ depthChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n      <span onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fspan>\n    <\u002Fsc-for>\n    <span onclick=\"{{ clearSel }}\" style=\"font-size:12px; color:#EC136E; font-weight:600; cursor:pointer; margin-left:4px;\">✕ Clear selection<\u002Fspan>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <span onclick=\"{{ toggleCorr }}\" style=\"{{ corrBtnStyle }}\">⚠ How v2 fixes v1.0<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- legend -->\n  <div style=\"background:#FBFAFD; border-bottom:1px solid #EFEDF4; padding:8px 26px; display:flex; align-items:center; gap:8px; flex:none; flex-wrap:wrap;\">\n    <sc-for list=\"{{ legend }}\" as=\"l\" hint-placeholder-count=\"9\">\n      <span onclick=\"{{ l.onClick }}\" style=\"{{ l.style }}\"><span style=\"{{ l.dot }}\"><\u002Fspan>{{ l.label }}<\u002Fspan>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- body -->\n  <div style=\"flex:1; display:grid; grid-template-columns:1fr 372px; min-height:0;\">\n\n    <!-- cards -->\n    <div style=\"overflow-y:auto; padding:20px 26px 60px;\">\n      <sc-for list=\"{{ domains }}\" as=\"d\" hint-placeholder-count=\"9\">\n        <div style=\"margin-bottom:22px;\">\n          <div style=\"display:flex; align-items:center; gap:9px; margin-bottom:11px;\">\n            <span style=\"{{ d.dot }}\"><\u002Fspan>\n            <span style=\"font-size:11px; letter-spacing:2px; font-weight:700; color:#201C50;\">{{ d.label }}<\u002Fspan>\n            <span style=\"font-size:11px; color:#8E8C99;\">{{ d.count }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-wrap:wrap; gap:11px;\">\n            <sc-for list=\"{{ d.entities }}\" as=\"e\" hint-placeholder-count=\"5\">\n              <div onclick=\"{{ e.onClick }}\" style=\"{{ e.cardStyle }}\">\n                <div style=\"{{ e.headStyle }}\">\n                  <span style=\"font-size:13px; font-weight:700;\">{{ e.name }}<\u002Fspan>\n                  <span style=\"font-size:10px; color:#8E8C99;\">{{ e.relLabel }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"padding:8px 12px 10px;\">\n                  <sc-for list=\"{{ e.fields }}\" as=\"f\" hint-placeholder-count=\"4\">\n                    <div style=\"display:flex; align-items:center; gap:7px; padding:2px 0;\">\n                      <span style=\"{{ f.tag }}\">{{ f.kind }}<\u002Fspan>\n                      <span class=\"mono\" style=\"font-size:11px; color:#1A1A1F;\">{{ f.name }}<\u002Fspan>\n                      <span style=\"font-size:10px; color:# id\"],\n    [\"evidence\",\"claim\",\"FOR_CLAIM\",\"evidence.claim_id\"],\n    [\"evidence\",\"regreq\",\"RESPONDS_TO\",\"evidence.regulator_request_id\"],\n  ];\n\n  CORRECTIONS = [\n    { title: \"First-class actors\", problem: \"producer_id / underwriter_id / actor_id / override_actor_id point to no entity.\", fix: \"Party supertype + Actor (human|agent); every actor pointer is an actor_id FK.\" },\n    { title: \"Payee is explicit\", problem: \"paid_to_party_id — customer, shop, or third party? Unknown.\", fix: \"Payment.paid_to_party_id → Party (any subtype), resolved.\" },\n    { title: \"Typed polymorphic edges\", problem: \"resolves_to_node_id / causal_trigger / :RECORDS hit any node type.\", fix: \"DatasetResolution carries typed FKs; RECORDS / REASONS_OVER / REFERS_TO use explicit (target_type, target_id).\" },\n    { title: \"No more name collisions\", problem: \"coverage_id and item_id are PKs on two entities each.\", fix: \"Coverage / PolicyCoverage / ClaimCoverage and InsuredItem / ClaimItem each have distinct PKs.\" },\n    { title: \"No orphans\", problem: \"13 of 27 entities had no relationship at all.\", fix: \"Every entity has at least one keyed relationship — nothing stands alone.\" },\n    { title: \"Claim ties to policy\", problem: \"ClaimEvent had no policy_id.\", fix: \"Claim.policy_id is mandatory; ClaimEvent hangs off Claim.\" },\n    { title: \"Loss ratio is computable\", problem: \"No exposure, earned premium, or incurred total.\", fix: \"Exposure (vehicle_months, earned_premium) + Reserve / Settlement / Payment give incurred — ratio derives from primitives.\" },\n    { title: \"Every relationship has a key\", problem: \"6 of 14 relationships carried no foreign key.\", fix: \"All 70 relationships carry an FK (or an explicit typed pair) — joinable in a relational store.\" },\n  ];\n\n  _adj() {\n    if (this._a) return this._a;\n    const a = {};\n    this.ENTITIES.forEach(e => a[e[0]] = new Set());\n    this.REL.forEach(r => { if (r[1]) { a[r[0]].add(r[1]); a[r[1]].add(r[0]); } });\n    this._a = a;\n    return a;\n  }\n  _highlight() {\n    const { sel, depth, domainFilter } = this.state;\n    if (sel) {\n      const adj = this._adj();\n      const seen = new Set([sel]);\n      let frontier = [sel];\n      const maxD = depth === 99 ? 99 : depth;\n      for (let d = 0; d < maxD && frontier.length; d++) {\n        const next = [];\n        frontier.forEach(n => adj[n].forEach(m => { if (!seen.has(m)) { seen.add(m); next.push(m); } }));\n        frontier = next;\n      }\n      return seen;\n    }\n    if (domainFilter) return new Set(this.ENTITIES.filter(e => e[1] === domainFilter).map(e => e[0]));\n    return null; // all\n  }\n\n  setDepth = (d) => this.setState({ depth: d });\n  pick = (id) => () => this.setState(s => ({ sel: s.sel === id ? null : id, domainFilter: null }));\n  clearSel = () => this.setState({ sel: null, domainFilter: null });\n  toggleCorr = () => this.setState(s => ({ showCorr: !s.showCorr }));\n  pickDomain = (id) => () => this.setState(s => ({ domainFilter: s.domainFilter === id ? null : id, sel: null }));\n\n  renderVals() {\n    const { sel, depth, showCorr, domainFilter } = this.state;\n    const hi = this._highlight();\n    const nameOf = {}; this.ENTITIES.forEach(e => nameOf[e[0]] = e[2]);\n    const domainOf = {}; this.ENTITIES.forEach(e => domainOf[e[0]] = e[1]);\n    const colorOf = {}; this.DOMAINS.forEach(d => colorOf[d.id] = d.color);\n\n    const relCount = {}; this.ENTITIES.forEach(e => relCount[e[0]] = 0);\n    this.REL.forEach(r => { relCount[r[0]] = (relCount[r[0]] || 0) + 1; if (r[1]) relCount[r[1]] = (relCount[r[1]] || 0) + 1; });\n\n    const tagStyle = (kind) => {\n      if (kind === \"pk\") return \"font-size:8.5px; font-weight:800; letter-spacing:.5px; color:#fff; background:#EC136E; padding:1px 5px; border-radius:4px;\";\n      if (kind === \"fk\") return \"font-size:8.5px; font-weight:800; letter-spacing:.5px; color:#fff; background:#5F8AB5; padding:1px er-spacing:.5px; cursor:pointer; color:${domainFilter===d.id?\"#fff\":\"#5F5E5A\"}; background:${domainFilter===d.id?d.color:\"#fff\"}; border:1px solid ${domainFilter===d.id?d.color:\"#DCD9E8\"};`,\n      dot: `width:8px; height:8px; border-radius:50%; background:${domainFilter===d.id?\"#fff\":d.color};` }));\n\n    const chip = (id) => `font-size:11.5px; font-weight:700; color:#fff; background:${colorOf[domainOf[id]]||\"#8E8C99\"}; padding:2px 8px; border-radius:6px;`;\n    const relevant = this.REL.filter(r => {\n      if (!hi) return true;\n      return hi.has(r[0]) || (r[1] && hi.has(r[1]));\n    });\n    const relRows = relevant.map(r => ({\n      from: nameOf[r[0]], to: r[1] ? nameOf[r[1]] : \"any node\",\n      label: r[2], key: r[3],\n      fromStyle: chip(r[0]),\n      toStyle: r[1] ? chip(r[1]) : \"font-size:11.5px; font-weight:700; color:#8E8C99; background:#F4F2F8; padding:2px 8px; border-radius:6px;\",\n      typedLabel: r[4] ? \"TYPED\" : \"\",\n      typedStyle: r[4] ? \"font-size:9px; font-weight:800; letter-spacing:.5px; color:#C77800; background:#FFF3E0; padding:1px 6px; border-radius:4px;\" : \"display:none;\",\n    }));\n\n    return {\n      stats: this.DOMAINS.length + \" domains · \" + this.ENTITIES.length + \" entities · \" + this.REL.length + \" relationships\",\n      domains, depthChips, legend,\n      clearSel: this.clearSel, toggleCorr: this.toggleCorr,\n      corrBtnStyle: `padding:5px 13px; border-radius:13px; font-size:11.5px; font-weight:700; cursor:pointer; background:${showCorr?\"#C77800\":\"#FFF3E0\"}; color:${showCorr?\"#fff\":\"#C77800\"};`,\n      showCorr, showRels: !showCorr, corrections: this.CORRECTIONS,\n      relRows, relTitle: sel ? (nameOf[sel] + \" — relationships\") : (domainFilter ? \"Domain relationships\" : \"All relationships (\" + this.REL.length + \")\"),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
